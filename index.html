<!DOCTYPE html>
<html>
<head>
  <title>Book Movies Kerala</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎬 Book Movies</h1>
</header>

<!-- MOVIES -->
<h2>Now Showing</h2>
<div id="movies" class="grid"></div>

<!-- CINEMAS -->
<h2 id="cinemaTitle" class="hidden">Select Cinema</h2>
<div id="cinemas" class="grid"></div>

<!-- SHOWS -->
<h2 id="showTitle" class="hidden">Select Show Time</h2>
<div id="shows" class="grid"></div>

<!-- SEATS -->
<div id="seatSection" class="hidden">
  <h2>Select Seats</h2>
  <div id="seats"></div>
  <p>Total: ₹<span id="total">0</span></p>
  <button onclick="checkout()">Proceed</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="hidden">
  <h2>💳 Checkout</h2>
  <p id="summary"></p>
  <button onclick="confirmBooking()">Pay & Confirm</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
